apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-scaler-sa
  namespace: default
  labels:
    app: ai-scaler
automountServiceAccountToken: false   # ← secure default; set true only in the Pod spec that needs it

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deployment-scaler-role
  namespace: default
  labels:
    app: ai-scaler
rules:
- apiGroups: ["apps"]
  resources: ["deployments", "deployments/scale"]
  verbs: ["get", "patch"]   # ← dropped list/watch/update — not needed just to scale

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: deployment-scaler-binding
  namespace: default
  labels:
    app: ai-scaler
subjects:
- kind: ServiceAccount
  name: ai-scaler-sa
  namespace: default
roleRef:
  kind: Role
  name: deployment-scaler-role
  apiGroup: rbac.authorization.k8s.io